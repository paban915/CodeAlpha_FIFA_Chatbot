<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIFA World Cup 2026 FAQ Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">⚽</span>
          <div>
            <h1>FIFA World Cup 2026</h1>
            <p>FAQ Chatbot — Ask me anything!</p>
          </div>
        </div>
        <div class="status-dot"><span></span> Online</div>
      </div>
    </header>

    <div class="chat-container" id="chatContainer">
      <div class="message bot">
        <div class="avatar">⚽</div>
        <div class="bubble">
          <p>Hey! I'm your <strong>FIFA World Cup 2026</strong> FAQ assistant! 🏆</p>
          <p>Ask me about teams, schedule, stadiums, rules, and more!</p>
          <div class="suggestions">
            <button onclick="sendSuggestion('Who are the host countries?')">🌎 Host countries?</button>
            <button onclick="sendSuggestion('How many teams are participating?')">👥 How many teams?</button>
            <button onclick="sendSuggestion('When does the tournament start?')">📅 When does it start?</button>
            <button onclick="sendSuggestion('Which stadiums are being used?')">🏟️ Stadiums?</button>
          </div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <textarea id="userInput" placeholder="Ask about World Cup 2026…" rows="1"></textarea>
      <button id="sendBtn" onclick="sendMessage()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
